<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeLab Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --accent3: #ff6b6b;
      --accent4: #ffd166;
      --text: #e2e8f0;
      --text-muted: #7c8db5;
      --border: #2d3250;
      --online: #00d4aa;
      --offline: #ff6b6b;
      --warning: #ffd166;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #clock {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    #search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      font-size: 0.85rem;
      width: 200px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }

    #search-input:focus {
      border-color: var(--accent);
      width: 260px;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 2rem;
      display: flex;
      gap: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--online);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── MAIN LAYOUT ── */
    main {
      padding: 2rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── SECTION HEADERS ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 2rem 0 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── CARD GRID ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-color, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--card-color, var(--accent));
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .card-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .status-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-online { background: rgba(0,212,170,0.15); color: var(--online); }
    .status-offline { background: rgba(255,107,107,0.15); color: var(--offline); }
    .status-warning { background: rgba(255,209,102,0.15); color: var(--warning); }

    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .card-meta {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .card-tag {
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* ── HIDDEN / SEARCH FILTER ── */
    .card.hidden { display: none; }

    /* ── ADD CARD BUTTON ── */
    .add-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      min-height: 120px;
    }

    .add-card:hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.05);
      color: var(--accent);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 90%;
      max-width: 480px;
      box-shadow: var(--shadow);
    }

    .modal h2 {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group select option {
      background: var(--surface);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn {
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--accent3); color: #fff; }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* ── EMOJI PICKER ── */
    .emoji-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 0.5rem;
    }

    .emoji-btn {
      width: 34px; height: 34px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s, transform 0.1s;
    }

    .emoji-btn:hover { background: var(--border); transform: scale(1.15); }
    .emoji-btn.selected { border-color: var(--accent); background: rgba(108,99,255,0.2); }

    /* ── CONTEXT MENU ── */
    .ctx-menu {
      display: none;
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0;
      min-width: 150px;
      z-index: 300;
      box-shadow: var(--shadow);
    }

    .ctx-menu.active { display: block; }

    .ctx-item {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctx-item:hover { background: var(--surface2); }
    .ctx-item.danger { color: var(--accent3); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1.2rem;
      font-size: 0.85rem;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 400;
    }

    #toast.show { transform: translateY(0); opacity: 1; }


    header .btn {
      padding: 0.35rem 0.85rem;
      font-size: 0.78rem;
      border-radius: 6px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      main { padding: 1rem; }
      header { padding: 0 1rem; }
      .stats-bar { padding: 0.5rem 1rem; }
      #search-input { width: 140px; }
      #search-input:focus { width: 180px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🏠</div>
    <span>HomeLab</span>
  </div>
  <div class="header-right">
    <input type="text" id="search-input" placeholder="🔍  Zoeken..." oninput="filterCards(this.value)" />
    <button class="btn btn-ghost" onclick="exportData()" title="Exporteer configuratie naar JSON">📥 Export</button>
    <label class="btn btn-ghost" title="Importeer configuratie vanuit JSON" style="cursor:pointer">
      📤 Import <input type="file" accept=".json" onchange="importData(event)" style="display:none" />
    </label>
    <span id="clock"></span>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-dot"></div>
    <span id="stat-online">0 online</span>
  </div>
  <div class="stat-item">📦 <span id="stat-total">0 services</span></div>
  <div class="stat-item">🗓️ <span id="stat-date"></span></div>
</div>

<!-- MAIN -->
<main id="main-content">
  <!-- Sections worden dynamisch geladen -->
</main>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxEdit()">✏️ Bewerken</div>
  <div class="ctx-item" onclick="ctxOpen()">🔗 Openen</div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑️ Verwijderen</div>
</div>

<!-- MODAL: ADD/EDIT -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">➕ Service toevoegen</h2>
    <div class="form-group">
      <label>Naam</label>
      <input type="text" id="f-name" placeholder="Bijv. Proxmox" />
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="text" id="f-url" placeholder="http://192.168.1.x:8006" />
    </div>
    <div class="form-group">
      <label>Omschrijving</label>
      <input type="text" id="f-desc" placeholder="Korte omschrijving" />
    </div>
    <div class="form-group">
      <label>Categorie</label>
      <select id="f-cat"></select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="f-status">
        <option value="online">🟢 Online</option>
        <option value="offline">🔴 Offline</option>
        <option value="warning">🟡 Onderhoud</option>
      </select>
    </div>
    <div class="form-group">
      <label>Tag (optioneel)</label>
      <input type="text" id="f-tag" placeholder="LXC / VM / Docker" />
    </div>
    <div class="form-group">
      <label>Icoon</label>
      <div class="emoji-row" id="emoji-row"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-danger" id="delete-btn" onclick="deleteService()" style="display:none">Verwijderen</button>
      <button class="btn btn-primary" onclick="saveService()">Opslaan</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════

const EMOJIS = ['🖥️','🐋','📦','🔒','📷','🎵','🎮','🌐','🔧','📊','💾','🗂️','🏠','🌿','🔗','🛡️','📡','⚙️','🚀','📺','🧪','🎛️','🔍','🗄️','🌍','🔑','💡','🧩','🤖','🖨️'];

const DEFAULT_CATEGORIES = [
  { id: 'infra',    name: '🖥️  Infrastructuur', color: '#6c63ff' },
  { id: 'media',    name: '🎬  Media & Bestanden', color: '#ff6b6b' },
  { id: 'netwerk',  name: '🌐  Netwerk',          color: '#00d4aa' },
  { id: 'monitoring', name: '📊  Monitoring',     color: '#ffd166' },
  { id: 'overig',   name: '🧩  Overig',           color: '#7c8db5' },
];

const DEFAULT_SERVICES = [
  { id: 's1', name: 'Proxmox VE',      url: 'https://192.168.1.1:8006', desc: 'Virtualisatie beheer',     cat: 'infra',    icon: '🖥️', status: 'online',  tag: 'Host' },
  { id: 's2', name: 'Nginx Proxy Mgr', url: 'http://192.168.1.1:81',   desc: 'Reverse proxy beheer',      cat: 'netwerk',  icon: '🌐', status: 'online',  tag: 'LXC' },
  { id: 's3', name: 'Immich',           url: 'http://192.168.1.1:2283', desc: 'Foto & video bibliotheek',  cat: 'media',    icon: '📷', status: 'online',  tag: 'LXC' },
  { id: 's4', name: 'Portainer',        url: 'http://192.168.1.1:9000', desc: 'Docker container beheer',   cat: 'infra',    icon: '🐋', status: 'online',  tag: 'LXC' },
  { id: 's5', name: 'Jellyfin',         url: 'http://192.168.1.1:8096', desc: 'Media server',              cat: 'media',    icon: '📺', status: 'online',  tag: 'LXC' },
  { id: 's6', name: 'Cloudflared',      url: 'http://192.168.1.1:14333', desc: 'Zero Trust tunnel',        cat: 'netwerk',  icon: '🛡️', status: 'online',  tag: 'LXC' },
  { id: 's7', name: 'Uptime Kuma',      url: 'http://192.168.1.1:3001', desc: 'Service monitoring',        cat: 'monitoring', icon: '📊', status: 'online', tag: 'LXC' },
  { id: 's8', name: 'Home Assistant',   url: 'http://192.168.1.1:8123', desc: 'Home automation',           cat: 'overig',   icon: '🏠', status: 'online',  tag: 'VM' },
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════

let state = loadState();
let ctxTarget = null;
let editTarget = null;
let selectedEmoji = '🖥️';

function loadState() {
  try {
    const s = localStorage.getItem('homelab_dash');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    categories: DEFAULT_CATEGORIES,
    services: DEFAULT_SERVICES
  };
}

function saveState() {
  localStorage.setItem('homelab_dash', JSON.stringify(state));
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════

function render() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  state.categories.forEach(cat => {
    const services = state.services.filter(s => s.cat === cat.id);

    const section = document.createElement('div');
    section.innerHTML = `
      <div class="section-header" style="--card-color:${cat.color}">
        <span>${cat.name}</span>
      </div>
      <div class="card-grid" id="grid-${cat.id}"></div>
    `;
    main.appendChild(section);

    const grid = section.querySelector(`#grid-${cat.id}`);

    services.forEach(svc => {
      const card = createCard(svc, cat.color);
      grid.appendChild(card);
    });

    // Add-knop
    const addBtn = document.createElement('div');
    addBtn.className = 'add-card';
    addBtn.innerHTML = `<span style="font-size:1.4rem">＋</span><span>Toevoegen</span>`;
    addBtn.onclick = () => openModal(null, cat.id);
    grid.appendChild(addBtn);
  });

  updateStats();
}

function createCard(svc, color) {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = svc.url;
  card.target = '_blank';
  card.dataset.id = svc.id;
  card.dataset.name = svc.name.toLowerCase();
  card.dataset.desc = svc.desc.toLowerCase();
  card.style.setProperty('--card-color', color);

  const statusClass = { online: 'status-online', offline: 'status-offline', warning: 'status-warning' }[svc.status] || 'status-online';
  const statusLabel = { online: 'Online', offline: 'Offline', warning: 'Onderhoud' }[svc.status] || 'Online';

  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${svc.icon}</div>
      <span class="status-badge ${statusClass}">${statusLabel}</span>
    </div>
    <div class="card-name">${svc.name}</div>
    <div class="card-desc">${svc.desc}</div>
    <div class="card-meta">
      <span class="card-tag">${svc.tag || ''}</span>
      <span>${new URL(svc.url).hostname || ''}</span>
    </div>
  `;

  card.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showCtxMenu(e.clientX, e.clientY, svc.id);
  });

  return card;
}

// ═══════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════

function updateStats() {
  const total = state.services.length;
  const online = state.services.filter(s => s.status === 'online').length;
  document.getElementById('stat-total').textContent = total + ' services';
  document.getElementById('stat-online').textContent = online + ' online';
}

// ═══════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════

function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('clock').textContent = time;
  const date = now.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('stat-date').textContent = date;
}

// ═══════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════

function filterCards(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(card => {
    const name = card.dataset.name || '';
    const desc = card.dataset.desc || '';
    card.classList.toggle('hidden', q && !name.includes(q) && !desc.includes(q));
  });
}

// ═══════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════

function openModal(svc, defaultCat) {
  editTarget = svc ? svc.id : null;
  const isEdit = !!svc;

  document.getElementById('modal-title').textContent = isEdit ? '✏️ Service bewerken' : '➕ Service toevoegen';
  document.getElementById('f-name').value  = svc?.name  || '';
  document.getElementById('f-url').value   = svc?.url   || 'http://192.168.1.';
  document.getElementById('f-desc').value  = svc?.desc  || '';
  document.getElementById('f-tag').value   = svc?.tag   || '';
  document.getElementById('f-status').value = svc?.status || 'online';
  document.getElementById('delete-btn').style.display = isEdit ? 'block' : 'none';

  // Cat dropdown
  const catSel = document.getElementById('f-cat');
  catSel.innerHTML = state.categories.map(c =>
    `<option value="${c.id}" ${(svc?.cat || defaultCat) === c.id ? 'selected' : ''}>${c.name}</option>`
  ).join('');

  // Emoji picker
  selectedEmoji = svc?.icon || '🖥️';
  const row = document.getElementById('emoji-row');
  row.innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji(this,'${e}')">${e}</button>`
  ).join('');

  document.getElementById('modal').classList.add('active');
  document.getElementById('f-name').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editTarget = null;
}

function selectEmoji(btn, emoji) {
  selectedEmoji = emoji;
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function saveService() {
  const name = document.getElementById('f-name').value.trim();
  const url  = document.getElementById('f-url').value.trim();
  if (!name || !url) { showToast('⚠️ Naam en URL zijn verplicht'); return; }

  const svc = {
    id:     editTarget || ('s' + Date.now()),
    name,
    url,
    desc:   document.getElementById('f-desc').value.trim(),
    cat:    document.getElementById('f-cat').value,
    status: document.getElementById('f-status').value,
    tag:    document.getElementById('f-tag').value.trim(),
    icon:   selectedEmoji,
  };

  if (editTarget) {
    const idx = state.services.findIndex(s => s.id === editTarget);
    if (idx !== -1) state.services[idx] = svc;
  } else {
    state.services.push(svc);
  }

  saveState();
  render();
  closeModal();
  showToast('✅ Opgeslagen!');
}

function deleteService() {
  if (!editTarget) return;
  state.services = state.services.filter(s => s.id !== editTarget);
  saveState();
  render();
  closeModal();
  showToast('🗑️ Verwijderd');
}

// ═══════════════════════════════════════════════
//  CONTEXT MENU
// ═══════════════════════════════════════════════

function showCtxMenu(x, y, id) {
  ctxTarget = id;
  const menu = document.getElementById('ctx-menu');
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  menu.classList.add('active');
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('active');
}

function ctxEdit() {
  const svc = state.services.find(s => s.id === ctxTarget);
  if (svc) openModal(svc);
  hideCtxMenu();
}

function ctxOpen() {
  const svc = state.services.find(s => s.id === ctxTarget);
  if (svc) window.open(svc.url, '_blank');
  hideCtxMenu();
}

function ctxDelete() {
  state.services = state.services.filter(s => s.id !== ctxTarget);
  saveState();
  render();
  hideCtxMenu();
  showToast('🗑️ Verwijderd');
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════


function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.categories || !data.services) throw new Error('Ongeldig formaat');
      state = data;
      saveState();
      render();
      showToast('✅ Configuratie geladen!');
    } catch(err) {
      showToast('❌ Ongeldig JSON-bestand');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'homelab-dashboard-backup.json';
  a.click();
  showToast('📥 Backup gedownload!');
}

// ═══════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════

document.addEventListener('click', (e) => {
  if (!e.target.closest('#ctx-menu')) hideCtxMenu();
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); hideCtxMenu(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════

render();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
